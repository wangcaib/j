<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>(ಥ⌣ಥ)</title>
    <link rel="icon" href="../i/girl.png" type="image/x-icon" />
    <link rel="shortcut icon" href="../i/girl.png" type="image/x-icon" />
    <link rel="stylesheet" type="text/css" href="../loader.css" />
    <script src="../loader.js"></script>
    <style>
      ::-webkit-scrollbar {
        display: none;
      }

      .thumbnail:hover {
        filter: saturate(2);
        transition: filter 0.3s ease;
      }

      button {
        background: linear-gradient(
          135deg,
          rgba(255, 154, 139, 0.35) 0%,
          rgba(255, 107, 157, 0.28) 50%,
          rgba(253, 160, 133, 0.22) 100%
        );
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: rgba(255, 255, 255, 0.95);
        width: 50px;
        height: 50px;
        border: 1px solid rgba(255, 154, 139, 0.4);
        border-radius: 50%;
        box-shadow:
          0 4px 15px rgba(255, 107, 157, 0.25),
          0 0 0 1px rgba(255, 154, 139, 0.15) inset;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        outline: none;
        position: absolute;
        font-size: 12px;
        font-weight: 500;
        font-family: "Poppins", sans-serif;
        cursor: pointer;
        opacity: 0.5;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      button:hover {
        opacity: 1;
        transform: translateY(-3px) scale(1.05);
        background: linear-gradient(
          135deg,
          rgba(255, 154, 139, 0.5) 0%,
          rgba(255, 107, 157, 0.42) 50%,
          #fda08561 100%
        );
        border-color: rgba(255, 107, 157, 0.6);
        box-shadow:
          0 8px 25px rgba(255, 107, 157, 0.4),
          0 0 0 1px rgba(255, 154, 139, 0.25) inset,
          0 0 20px rgba(255, 107, 157, 0.3);
      }

      #showAllButton {
        top: 6vh;
        right: 4vw;
      }

      #autoPlayButton {
        top: 6vh;
        right: 9vw;
      }

      #nextButton {
        top: 6vh;
        right: 14vw;
      }

      #thumbnailContainer {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        flex-wrap: wrap;
        align-content: flex-start;
      }

      #thumbnailContainer img {
        width: 6.5vw;
        margin: 0.85vw;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s ease-in-out;
      }

      #thumbnailContainer img:hover {
        transform: translateY(-5px);
        box-shadow:
          0 8px 25px rgba(255, 107, 107, 0.5),
          0 0 0 1px rgba(255, 107, 156, 0.2) inset,
          0 0 20px rgba(255, 107, 107, 0.15);
      }

      .h {
        position: relative;
        width: 100%;
        margin-top: 4vh;
        margin-bottom: 4vh;
        text-align: center;
        font-size: 4em;
        font-weight: 700;
        font-family: "Dancing Script", cursive;
        background: linear-gradient(
          135deg,
          #ff9a8b 0%,
          #ff6b9d 35%,
          #fda085 65%,
          #fcb69f 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 1.5vw;
      }

      @media only screen and (max-width: 1100px) {
        button {
          font-size: 2vw;
          width: 25px;
          height: 25px;
        }

        #nextButton {
          position: fixed;
          top: 2.5vh;
          right: 1vw;
        }

        #autoPlayButton {
          position: fixed;
          top: 9.5vh;
          right: 1vw;
        }

        #showAllButton {
          position: fixed;
          top: 16.5vh;
          right: 1vw;
        }

        #thumbnailContainer img {
          width: 14.5vw;
        }

        .h {
          letter-spacing: 1vw;
          font-size: 1.5em;
          margin-top: 1.5vh;
          margin-bottom: 1.5vh;
        }
      }
    </style>
  </head>
  <body>
    <!-- 加载动画 -->
    <div class="cssload-main" id="loader">
      <div class="cssload-heart">
        <span class="cssload-heartL"></span>
        <span class="cssload-heartR"></span>
        <span class="cssload-square"></span>
      </div>
      <div class="cssload-shadow"></div>
    </div>

    <!-- 主内容 -->
    <section id="mainSection" style="display: none">
      <p class="h">
        <a>老</a
        ><a style="text-decoration: none" href="../img/bubble.html">姐</a>出嫁诗
      </p>
      <div id="thumbnailContainer"></div>
      <button id="nextButton">▷</button>
      <button id="showAllButton">◯</button>
      <button id="autoPlayButton">▶</button>
    </section>

    <script>
      window.onload = function () {
        var images = [];

        // 使用循环将文件夹中的57张照片添加到数组中
        for (var i = 1; i <= 57; i++) {
          images.push(i + ".jpg");
        }

        var currentImageIndex = 1;
        var imageInterval;

        var nextButton = document.getElementById("nextButton");
        var thumbnailContainer = document.getElementById("thumbnailContainer");
        var showAllButton = document.getElementById("showAllButton");
        var autoPlayButton = document.getElementById("autoPlayButton");

        // 创建第一张缩略图
        var firstThumbnail = document.createElement("img");
        firstThumbnail.src = images[currentImageIndex - 1];
        firstThumbnail.className = "thumbnail";
        thumbnailContainer.appendChild(firstThumbnail);

        // 下一张按钮点击事件
        nextButton.addEventListener("click", function () {
          showNextImage();
        });

        // 自动播放按钮点击事件
        autoPlayButton.addEventListener("click", function () {
          if (imageInterval) {
            clearInterval(imageInterval);
            imageInterval = null;
            autoPlayButton.innerHTML = "▶";
          } else {
            imageInterval = setInterval(showNextImage, 400);
            autoPlayButton.innerHTML = "❚❚";
          }
        });

        // 显示下一张图片
        function showNextImage() {
          if (currentImageIndex < images.length) {
            var thumbnailImg = document.createElement("img");
            thumbnailImg.src = images[currentImageIndex];
            thumbnailImg.className = "thumbnail";
            thumbnailContainer.appendChild(thumbnailImg);
            currentImageIndex++;
          } else {
            currentImageIndex = 1;
            thumbnailContainer.innerHTML = "";
            var firstThumbnail = document.createElement("img");
            firstThumbnail.src = images[currentImageIndex - 1];
            firstThumbnail.className = "thumbnail";
            thumbnailContainer.appendChild(firstThumbnail);
          }
        }

        // 显示所有照片按钮点击事件
        showAllButton.addEventListener("click", function () {
          thumbnailContainer.innerHTML = "";
          images.forEach(function (image) {
            var thumbnailImg = document.createElement("img");
            thumbnailImg.src = image;
            thumbnailImg.className = "thumbnail";
            thumbnailContainer.appendChild(thumbnailImg);
          });
          currentImageIndex = 57;
        });
      };
    </script>
  </body>
</html>
