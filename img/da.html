<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>(⑉°з°)-♡</title>
    <link rel="icon" href="../i/girl.png" type="image/x-icon" />
    <link rel="shortcut icon" href="../i/girl.png" type="image/x-icon" />
    <link rel="stylesheet" type="text/css" href="../loader.css" />
    <script src="../loader.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap");

      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      html,
      body {
        overflow-x: hidden;
        width: 100%;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: "Poppins", sans-serif;
        background: linear-gradient(
          135deg,
          #fffefef3 0%,
          #fff5f5e0 50%,
          #fffbf8c3 100%
        );
      }

      #slideshow {
        width: 85vh;
        height: 85vh;
        max-width: 95vw;
        max-height: 95vh;
        position: relative;
        overflow: hidden;
        border-radius: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      #slideshow::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 30px;
        padding: 2px;
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        z-index: 10;
        pointer-events: none;
      }

      #slide {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition:
          opacity 0.6s ease,
          transform 0.6s ease;
      }

      .nav-btn {
        position: absolute;
        background: linear-gradient(
          135deg,
          rgba(255, 154, 139, 0.35) 0%,
          rgba(255, 107, 157, 0.28) 50%,
          rgba(253, 160, 133, 0.22) 100%
        );
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: rgba(255, 255, 255, 0.9);
        padding: 12px 18px;
        border: 1px solid rgba(255, 154, 139, 0.4);
        border-radius: 25px;
        box-shadow: 0 4px 15px rgba(255, 107, 157, 0.25);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        outline: none;
        font-size: 18px;
        font-weight: 500;
        cursor: pointer;
        opacity: 0.3;
        z-index: 20;
      }

      .nav-btn:hover {
        opacity: 0.8;
        transform: translateY(-3px) scale(1.05);
        background: linear-gradient(
          135deg,
          rgba(255, 154, 139, 0.5) 0%,
          rgba(255, 107, 157, 0.42) 50%,
          rgba(253, 160, 133, 0.38) 100%
        );
        border-color: rgba(255, 107, 157, 0.6);
        box-shadow:
          0 8px 25px rgba(255, 107, 157, 0.4),
          0 0 20px rgba(255, 107, 157, 0.3);
      }

      .nav-btn:active {
        transform: translateY(-1px) scale(1.02);
      }

      #previous {
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
      }

      #next {
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
      }

      #last {
        top: 15px;
        right: 15px;
      }

      #linkButton {
        top: 15px;
        left: 15px;
      }
      /* 页码指示器 */
      #counter {
        position: absolute;
        bottom: 15px;
        left: 50%;
        transform: translateX(-50%);
        background: linear-gradient(
          135deg,
          rgba(255, 154, 139, 0.35) 0%,
          rgba(255, 107, 157, 0.28) 100%
        );
        backdrop-filter: blur(10px);
        padding: 8px 20px;
        border-radius: 20px;
        color: rgba(255, 255, 255, 0.9);
        font-size: 14px;
        font-family: "Dancing Script", cursive;
        letter-spacing: 3px;
        z-index: 20;
        border: 1px solid rgba(255, 154, 139, 0.3);
        opacity: 0.2;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #counter:hover {
        opacity: 0.8;

        background: linear-gradient(
          135deg,
          rgba(255, 154, 139, 0.5) 0%,
          rgba(255, 107, 157, 0.42) 50%,
          rgba(253, 160, 133, 0.38) 100%
        );
        border-color: rgba(255, 107, 157, 0.6);
        box-shadow:
          0 8px 25px rgba(255, 107, 157, 0.4),
          0 0 20px rgba(255, 107, 157, 0.3);
      }

      /* 移动端适配 */
      @media only screen and (max-width: 767px) {
        #slideshow {
          width: 95vw;
          height: 95vw;
          max-height: 80vh;
          border-radius: 20px;
        }

        #slideshow::before {
          border-radius: 20px;
        }

        .nav-btn {
          padding: 10px 14px;
          font-size: 14px;
          opacity: 0.3;
        }

        #previous {
          left: 5px;
        }

        #next {
          right: 5px;
        }

        #last,
        #linkButton {
          top: 10px;
          padding: 8px 14px;
          font-size: 14px;
        }

        #linkButton {
          left: 10px;
          font-size: 13px;
        }

        #last {
          right: 10px;
        }

        #counter {
          bottom: 10px;
          padding: 6px 14px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="cssload-main">
      <div class="cssload-heart">
        <span class="cssload-heartL"></span>
        <span class="cssload-heartR"></span>
        <span class="cssload-square"></span>
      </div>
      <div class="cssload-shadow"></div>
    </div>

    <section style="display: none">
      <div id="slideshow">
        <img id="slide" src="" alt="Slide Image" />
        <button id="previous" class="nav-btn">•ू (•́<</button>
        <button id="next" class="nav-btn">#•́)つ</button>
        <button id="last" style="font-size: 14px" class="nav-btn">▷▷</button>
        <button
          id="linkButton"
          class="nav-btn"
          onclick="window.location = 'xiao.html'"
        >
          |ω・
        </button>
        <div id="counter">1 / 57</div>
      </div>

      <script>
        var images = [];
        for (var i = 1; i <= 57; i++) {
          images.push(i + ".jpg");
        }

        var currentIndex = 0;
        var slide = document.getElementById("slide");
        var linkButton = document.getElementById("linkButton");
        var counter = document.getElementById("counter");

        function showSlide(index) {
          slide.style.opacity = "0";
          slide.style.transform = "scale(1.02)";

          setTimeout(function () {
            slide.src = images[index];
            slide.style.opacity = "1";
            slide.style.transform = "scale(1)";
          }, 300);

          counter.textContent = index + 1 + " / " + images.length;

          if (index === images.length - 1) {
            linkButton.style.display = "block";
          } else {
            linkButton.style.display = "none";
          }
        }

        function nextSlide() {
          currentIndex = (currentIndex + 1) % images.length;
          showSlide(currentIndex);
        }

        function previousSlide() {
          currentIndex = (currentIndex - 1 + images.length) % images.length;
          showSlide(currentIndex);
        }

        function lastSlide() {
          currentIndex = images.length - 1;
          showSlide(currentIndex);
        }

        // 初始化
        showSlide(currentIndex);

        document.getElementById("next").addEventListener("click", nextSlide);
        document
          .getElementById("previous")
          .addEventListener("click", previousSlide);
        document.getElementById("last").addEventListener("click", lastSlide);

        // 键盘导航
        document.addEventListener("keydown", function (e) {
          if (e.key === "ArrowLeft") previousSlide();
          if (e.key === "ArrowRight") nextSlide();
          if (e.key === "ArrowEnd") lastSlide();
        });
      </script>
    </section>
  </body>
</html>
