<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>(♡3♡)</title>
    <link rel="icon" href="../i/girl.png" type="image/x-icon" />
    <link rel="shortcut icon" href="../i/girl.png" type="image/x-icon" />
    <link rel="stylesheet" type="text/css" href="../loader.css" />
    <script src="../loader.js"></script>
    <style>
      * {
        padding: 0;
        margin: 0;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(
          135deg,
          #fffefef3 0%,
          #fff5f5e0 50%,
          #fffbf8c3 100%
        );
      }

      .shell {
        display: flex;
        width: 90vw;
        max-width: 900px;
        height: 300px;
      }

      .box {
        flex: 1;
        overflow: hidden;
        transition: 0.5s;
        margin: 0 20px;
        box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.5);
        border-radius: 50px;
        border: 2px solid rgb(255, 255, 255);
        background-color: #fff;
        position: relative;
      }

      .box > img {
        width: 200%;
        height: 100%;
        object-fit: cover;
        transition: 0.5s;
      }

      .box .button-container {
        position: absolute;
        top: 10px;
        right: -210px;
        width: 300px;
        visibility: hidden;
      }

      .box:hover {
        flex-basis: 40%;
        border-color: rgba(253, 160, 133, 0.5);
        box-shadow:
          0 8px 25px rgba(255, 107, 157, 0.2),
          0 0 0 1px rgba(255, 154, 139, 0.21) inset,
          0 0 20px rgba(255, 107, 124, 0.418);
      }

      .box:hover > img {
        width: 100%;
        height: 100%;
        filter: saturate(2);
        /* 鼠标悬停时增加饱和度 */
      }

      .box:hover .button-container {
        visibility: visible;
      }

      button {
        background: linear-gradient(
          135deg,
          rgba(255, 154, 139, 0.35) 0%,
          rgba(255, 107, 157, 0.28) 50%,
          rgba(253, 160, 133, 0.22) 100%
        );
        backdrop-filter: blur(10px);
        color: rgba(255, 255, 255, 0.95);
        padding: 10px 10px;
        margin: 3px 10px;
        border: 1px solid rgba(255, 154, 139, 0.4);
        border-radius: 40px;
        box-shadow:
          0 4px 15px rgba(255, 107, 157, 0.25),
          0 0 0 1px rgba(255, 154, 139, 0.15) inset;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        outline: none;
        top: 50%;
        transform: translateY(-0%);
        font-size: 14px;
        font-weight: 500;
        font-family: "Poppins", sans-serif;
        cursor: pointer;
        transition: 0s;
      }

      .button:hover {
        opacity: 1;
        transform: translateY(-px) scale(1.02);
        background: linear-gradient(
          135deg,
          rgba(255, 154, 139, 0.5) 0%,
          rgba(255, 107, 157, 0.42) 50%,
          rgba(253, 160, 133, 0.38) 100%
        );
        border-color: rgba(255, 107, 157, 0.6);
        box-shadow:
          0 8px 25px rgba(255, 107, 157, 0.4),
          0 0 0 1px rgba(255, 154, 139, 0.25) inset,
          0 0 20px rgba(255, 107, 157, 0.3);
      }

      Button:active {
        transform: translateY(-1px) scale(1.02);
      }

      @media only screen and (max-width: 767px) {
        .shell {
          flex-direction: column;
          height: 600px;
        }
      }
    </style>
  </head>
  <div class="cssload-main">
    <div class="cssload-heart">
      <span class="cssload-heartL"></span>
      <span class="cssload-heartR"></span>
      <span class="cssload-square"></span>
    </div>
    <div class="cssload-shadow"></div>
  </div>

        <div class="box">

        </div>
        <div class="box">

        </div>
        <div class="box">

        </div>
        <div class="box">

              |ω・）

        </div>
      </div>
    </body>
  </section>
</html>
